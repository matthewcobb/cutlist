# Cutlist configuration
# Edit values here to change defaults. Saved from the UI writes back to this file.

bladeWidth: 3
distanceUnit: mm
margin: 0
optimize: CNC
showPartNumbers: true

# Stock presets available in the "Add preset" dropdown.
# Entries with `default: true` are auto-added to new projects.
stock:
  - label: Plywood (mm)
    default: true
    material: Plywood
    color: '#d2b996'
    unit: mm
    sizes:
      - width: 1220
        length: 2440
        thickness: [18, 12, 9, 6]

  - label: MDF (mm)
    default: true
    material: MDF
    color: '#b09078'
    unit: mm
    sizes:
      - width: 1220
        length: 2440
        thickness: [18, 12, 9, 6, 3]

  - label: Particle Board (mm)
    default: false
    material: Particle Board
    color: '#c8b48c'
    unit: mm
    sizes:
