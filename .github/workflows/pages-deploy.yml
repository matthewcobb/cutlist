name: Deploy GitHub Pages

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Compute base URL
        id: base
        run: |
          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          owner_lc="$(echo "$owner" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo "$repo" | tr '[:upper:]' '[:lower:]')"

          if [ "$repo_lc" = "$owner_lc.github.io" ]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$repo/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          NUXT_APP_BASE_URL: ${{ steps.base.outputs.value }}
        run: bun run build:static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/.output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
